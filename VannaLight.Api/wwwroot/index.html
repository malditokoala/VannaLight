<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VannaLight - Asistente de IA (Dark Mode)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .chat-container {
            max-width: 900px;
            margin: 30px auto;
        }

        /* --- Consola de Logs (Estilo Hacker) --- */
        #logArea {
            height: 150px;
            overflow-y: auto;
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Consolas', monospace;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 15px;
            border: 1px solid #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- Tarjeta de Resultados --- */
        .result-card {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            animation: slideUp 0.4s ease-out;
            margin-top: 20px;
            border: 1px solid #333;
            border-left: 5px solid #00ffcc;
        }

        /* --- Estilo KPI (Dark) --- */
        .kpi-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid #444;
            transition: transform 0.2s, box-shadow 0.2s;
        }

            .kpi-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
            }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00ffcc;
            word-wrap: break-word;
        }

        .kpi-label {
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sql-badge {
            font-size: 0.8rem;
            background-color: #2a2a2a;
            color: #00ffcc;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
            border: 1px solid #444;
            transition: 0.3s;
        }

            .sql-badge:hover {
                background-color: #00ffcc;
                color: #000;
            }
    </style>
</head>
<body>
    <div class="container chat-container">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-light"><i class="fa-solid fa-microchip" style="color: #00ffcc;"></i> VannaLight</h2>
            <p class="text-muted">Asistente Text-to-SQL (Fase 2)</p>
        </div>

        <div class="card shadow-lg p-4 border-0">
            <div class="input-group input-group-lg">
                <input type="text" id="txtQuestion" class="form-control bg-dark text-light" placeholder="Ej: ¿Cuáles son los 5 productos más caros?" onkeypress="handleKeyPress(event)">
                <button class="btn btn-outline-secondary" id="btnMic" onclick="startDictation()" title="Dictar pregunta">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button class="btn btn-outline-info" id="btnSend" onclick="sendQuestion()" style="border-color: #00ffcc; color: #00ffcc;">
                    <span class="spinner-border spinner-border-sm" id="loadingIcon" style="display:none;"></span> Preguntar
                </button>
            </div>

            <div id="logArea"><i>Esperando conexión con el núcleo neural...</i><br></div>
        </div>

        <div id="resultArea" class="result-card">
            <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-3">
                <h5 class="text-light m-0"><i class="fa-solid fa-chart-column" style="color: #00ffcc;"></i> Resultado</h5>

                <div class="btn-group btn-group-sm shadow-sm" role="group" id="viewToggleGroup" style="display:none;">
                    <input type="radio" class="btn-check" name="viewRadio" id="btnViewChart" autocomplete="off" checked onchange="switchView('chart')">
                    <label class="btn btn-outline-info" for="btnViewChart" style="border-color: #00ffcc;"><i class="fa-solid fa-chart-pie"></i> Gráfica</label>

                    <input type="radio" class="btn-check" name="viewRadio" id="btnViewTable" autocomplete="off" onchange="switchView('table')">
                    <label class="btn btn-outline-info" for="btnViewTable" style="border-color: #00ffcc;"><i class="fa-solid fa-table"></i> Tabla</label>
                </div>
            </div>

            <small id="explanationText" class="text-muted d-block mb-3"></small>

            <div id="kpiContainer"></div>

            <div id="chartContainer" class="mb-2" style="display:none; height: 320px; width: 100%;">
                <canvas id="liaChart"></canvas>
            </div>

            <div id="tableContainer" style="display:none;"></div>

            <div class="mt-4 pt-2 border-top border-secondary text-end">
                <span id="btnToggleSql" class="sql-badge" onclick="toggleSql()">
                    <i class="fa-solid fa-code"></i> T-SQL
                </span>
                <div id="sqlContainer" class="mt-3 p-3 bg-dark border border-secondary rounded text-start font-monospace small text-info" style="display:none; overflow-x:auto;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/hub/assistant")
            .withAutomaticReconnect()
            .build();

        let myConnectionId = "";
        const logArea = document.getElementById("logArea");
        const resultArea = document.getElementById("resultArea");
       // const dynamicContent = document.getElementById("dynamicContent");
        const sqlContainer = document.getElementById("sqlContainer");
        const btnSend = document.getElementById("btnSend");
        const loadingIcon = document.getElementById("loadingIcon");

        function logMessage(msg, isError = false, isSystem = false) {
            const time = new Date().toLocaleTimeString();
            let color = "#00ffcc"; // Verde/cyan hacker
            if (isError) color = "#ff4444";
            if (isSystem) color = "#aaaaaa";
            logArea.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- MANEJO DE EVENTOS DE VANNALIGHT (FASE 2) ---

        connection.on("JobStatusUpdated", (data) => {
            logMessage(`⏳ Procesando... Estado interno: ${data.status}`, false, true);
        });

        connection.on("JobFailed", (data) => {
            logMessage(`❌ Error en la base de datos o modelo: ${data.error}`, true);
            resetUI();
        });

        connection.on("JobCompleted", (payload) => {
            logMessage(`✅ ¡Datos extraídos correctamente!`);
            resetUI();
            resultArea.style.display = 'block';

            sqlContainer.innerText = payload.sql;
            sqlContainer.style.display = 'none';

            renderSqlData(payload.data);

            // --- NUEVA LÍNEA PARA QUE HABLE ---
            let textToSpeak = "Consulta completada.";
            if (payload.data && payload.data.length === 1) {
                // Si es un KPI, que lea el valor (ej. "El resultado es 500")
                const firstKey = Object.keys(payload.data[0])[0];
                const val = formatValue(payload.data[0][firstKey]);
                textToSpeak = `El resultado para ${firstKey} es ${val}.`;
            } else if (payload.data) {
                // Si es una tabla, que diga cuántas filas encontró
                textToSpeak = `Encontré ${payload.data.length} registros. Mostrando tabla en pantalla.`;
            }
            speakSummary(textToSpeak);
        });

        // --- MOTOR DE RENDERIZADO VISUAL ---
        let currentChart = null; // Variable global para controlar la gráfica

        // --- FUNCIÓN PARA CAMBIAR LA VISTA (TABLA / GRÁFICA) ---
        function switchView(viewType) {
            const chartDiv = document.getElementById("chartContainer");
            const tableDiv = document.getElementById("tableContainer");

            if (viewType === 'chart') {
                chartDiv.style.display = 'block';
                tableDiv.style.display = 'none';
            } else {
                chartDiv.style.display = 'none';
                tableDiv.style.display = 'block';
            }
        }

        // --- MOTOR DE RENDERIZADO VISUAL ACTUALIZADO ---
        function renderSqlData(dataArray) {
            // Referencias a los nuevos contenedores
            const kpiDiv = document.getElementById("kpiContainer");
            const chartDiv = document.getElementById("chartContainer");
            const tableDiv = document.getElementById("tableContainer");
            const toggleBtn = document.getElementById("viewToggleGroup");

            // Reset visual
            kpiDiv.innerHTML = '';
            tableDiv.innerHTML = '';
            chartDiv.style.display = 'none';
            tableDiv.style.display = 'none';
            toggleBtn.style.display = 'none';

            if (!dataArray || dataArray.length === 0) {
                kpiDiv.innerHTML = `<div class="alert alert-warning text-dark"><i class="fa-solid fa-triangle-exclamation"></i> Sin resultados.</div>`;
                return;
            }

            // 1. MODO KPI: Si es 1 sola fila
            if (dataArray.length === 1) {
                const row = dataArray[0];
                const keys = Object.keys(row);
                let html = '<div class="row justify-content-center">';
                keys.forEach(key => {
                    html += `
                        <div class="col-md-4 col-sm-6 mb-3">
                            <div class="kpi-card">
                                <div class="kpi-label">${key}</div>
                                <div class="kpi-value">${formatValue(row[key])}</div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                kpiDiv.innerHTML = html;
                return; // Terminamos aquí, no hay gráfica ni tabla
            }

            // 2. MODO MÚLTIPLES FILAS
            const headers = Object.keys(dataArray[0]);

            // Generar el HTML de la tabla
            let tableHtml = `
                <div class="table-responsive">
                    <table class="table table-dark table-hover table-bordered align-middle shadow-sm mb-0">
                        <thead class="table-secondary" style="color: #000;">
                            <tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>
                        </thead>
                        <tbody>
            `;
            dataArray.forEach(row => {
                tableHtml += `<tr>${headers.map(h => `<td>${formatValue(row[h])}</td>`).join('')}</tr>`;
            });
            tableHtml += `</tbody></table></div>`;
            if (dataArray.length > 20) {
                tableHtml += `<p class="text-info small text-end fst-italic mt-2">Mostrando ${dataArray.length} registros.</p>`;
            }
            tableDiv.innerHTML = tableHtml;

            // Intentar graficar
            let labelCol = null;
            let valCol = null;
            if (headers.length >= 2) {
                for (let h of headers) {
                    if (typeof dataArray[0][h] === 'number' && !valCol) valCol = h;
                    else if (!labelCol) labelCol = h;
                }
            }

            if (labelCol && valCol && dataArray.length <= 50) {
                // SÍ se puede graficar
                const labels = dataArray.map(row => row[labelCol]);
                const values = dataArray.map(row => row[valCol]);
                renderChart(labels, values, valCol);

                // Mostrar los botones y activar vista gráfica por defecto
                toggleBtn.style.display = 'inline-flex';
                document.getElementById('btnViewChart').checked = true;
                switchView('chart');
            } else {
                // NO se puede graficar (son puros textos o muchas columnas), forzamos la tabla
                tableDiv.style.display = 'block';
            }
        }

        // --- FUNCIÓN PARA DIBUJAR LA GRÁFICA (DARK THEME) ---
        function renderChart(labels, values, valueLabel) {
            const ctx = document.getElementById('liaChart').getContext('2d');

            // Destruir gráfica anterior si existe
            if (currentChart) {
                currentChart.destroy();
            }

            // Cambiar automáticamente a gráfica horizontal si hay muchas etiquetas
            const isHorizontal = labels.length > 8;

            currentChart = new Chart(ctx, {
                type: isHorizontal ? 'bar' : 'bar', // Puedes usar 'line' o 'doughnut' si prefieres
                data: {
                    labels: labels,
                    datasets: [{
                        label: valueLabel,
                        data: values,
                        backgroundColor: 'rgba(0, 255, 204, 0.7)', // Cyan hacker
                        borderColor: '#00ffcc',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: isHorizontal ? 'y' : 'x',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false } // Ocultamos la leyenda para que se vea más limpio
                    },
                    scales: {
                        x: {
                            ticks: { color: '#aaa' },
                            grid: { color: '#333' }
                        },
                        y: {
                            ticks: { color: '#aaa' },
                            grid: { color: '#333' },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function formatValue(val) {
            if (typeof val === 'number') {
                // Formato de moneda/decimales si tiene punto decimal
                if (val % 1 !== 0) return val.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                return val.toLocaleString('es-MX');
            }
            return val;
        }

        function toggleSql() {
            sqlContainer.style.display = sqlContainer.style.display === 'none' ? 'block' : 'none';
        }

        function resetUI() {
            loadingIcon.style.display = 'none';
            btnSend.disabled = false;
        }

        async function startConnection() {
            try {
                await connection.start();
                logMessage("✅ Sistema en línea. Motor RTX listo.");
                myConnectionId = connection.connectionId;
            } catch (err) {
                logMessage(`⚠️ Error de conexión WebSocket. Reintentando...`, true);
                setTimeout(startConnection, 5000);
            }
        }

        startConnection();

        // --- 5. MOTOR DE VOZ (MANOS LIBRES) ---

        // A. Speech-to-Text (Escuchar)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.lang = 'es-MX'; // Optimizado para acento local
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                const btnMic = document.getElementById("btnMic");
                btnMic.classList.replace("btn-outline-secondary", "btn-danger");
                btnMic.innerHTML = '<i class="fa-solid fa-microphone-lines border-0"></i>';
                logMessage("🎤 Escuchando...", false, true);
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById("txtQuestion").value = transcript;
                logMessage(`🗣️ Voz detectada: "${transcript}"`, false, true);

                // ¡Autodisparo! En cuanto termina de hablar, envía la pregunta
                sendQuestion();
            };

            recognition.onend = () => {
                const btnMic = document.getElementById("btnMic");
                btnMic.classList.replace("btn-danger", "btn-outline-secondary");
                btnMic.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            };
        }

        function startDictation() {
            if (recognition) recognition.start();
            else alert("Tu navegador no soporta dictado por voz. Usa Chrome, Edge o Safari.");
        }

        // B. Text-to-Speech (Hablar)
        // --- TEXT-TO-SPEECH MEJORADO ---
        let systemVoices = [];

        // El navegador carga las voces de forma asíncrona, debemos atraparlas cuando estén listas
        window.speechSynthesis.onvoiceschanged = () => {
            systemVoices = window.speechSynthesis.getVoices();
        };

        function speakSummary(text) {
            if (!('speechSynthesis' in window)) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);

            // 1. PRIORIDAD MÁXIMA: Voz Neuronal/Online específicamente de México (es-MX)
            let bestVoice = systemVoices.find(v => v.lang === 'es-MX' &&
                (v.name.includes('Online') || v.name.includes('Neural') || v.name.includes('Google')));

            // 2. Segunda opción: Cualquier voz local de México (es-MX) aunque sea la robótica normal
            if (!bestVoice) bestVoice = systemVoices.find(v => v.lang === 'es-MX');

            // 3. Tercera opción: Cualquier voz Neuronal/Online en español general (Neutro/Otros)
            if (!bestVoice) bestVoice = systemVoices.find(v => v.lang.startsWith('es') &&
                (v.name.includes('Online') || v.name.includes('Neural') || v.name.includes('Google')));

            // 4. Fallback final: La primera que caiga en español
            if (!bestVoice) bestVoice = systemVoices.find(v => v.lang.startsWith('es'));

            if (bestVoice) {
                utterance.voice = bestVoice;
                logMessage(`🔊 Usando motor de voz: ${bestVoice.name}`, false, true);
            }

            // Ajustes sutiles para sonar natural
            utterance.rate = 1.05;
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }

        async function sendQuestion() {
            const question = document.getElementById("txtQuestion").value;
            if (!question || !myConnectionId) return;

            loadingIcon.style.display = 'inline-block';
            btnSend.disabled = true;
            resultArea.style.display = 'none';

            // --- ESTE ES EL CAMBIO (Limpiamos los nuevos contenedores) ---
            document.getElementById("kpiContainer").innerHTML = '';
            document.getElementById("tableContainer").innerHTML = '';
            document.getElementById("chartContainer").style.display = 'none';
            // -------------------------------------------------------------

            logMessage(`--------------------------------`, false, true);
            logMessage(`👤 Usuario: ${question}`);

            try {
                const response = await fetch("/api/assistant/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ Question: question, ConnectionId: myConnectionId })
                });

                if (!response.ok) {
                    logMessage(`❌ Error HTTP: ${response.status}`, true);
                    resetUI();
                }
            } catch (error) {
                logMessage(`❌ Error de Red: ${error}`, true);
                resetUI();
            }

            document.getElementById("txtQuestion").value = '';
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendQuestion(); }
    </script>
</body>
</html>
