<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VannaLight — Asistente Industrial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        :root {
            --bg: #09090c;
            --surface: #0f1117;
            --panel: #161b25;
            --border: #1e2535;
            --border2: #28304a;
            --text: #dde4f0;
            --muted: #4a5568;
            --dim: #7a8a9e;
            --sql-c: #22d3ee;
            --sql-bg: #0a1f2e;
            --sql-glow: rgba(34,211,238,.2);
            --docs-c: #34d399;
            --docs-bg: #091f18;
            --docs-glow: rgba(52,211,153,.2);
            --pred-c: #a78bfa;
            --pred-bg: #130d24;
            --pred-glow: rgba(167,139,250,.2);
            --a: var(--sql-c);
            --a-bg: var(--sql-bg);
            --a-glow: var(--sql-glow);
            --radius: 6px;
            --mono: 'IBM Plex Mono',monospace;
            --sans: 'IBM Plex Sans',sans-serif;
            --cond: 'IBM Plex Sans Condensed',sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            font-size: 15px
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-size: 28px 28px;
                z-index: 0;
                background-image: radial-gradient(circle,rgba(255,255,255,.045) 1px,transparent 1px);
                pointer-events: none;
            }

        .app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 72px 1fr;
            grid-template-rows: 56px 1fr;
            min-height: 100vh
        }

        /* TOPBAR */
        .topbar {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 0 0;
            border-bottom: 1px solid var(--border);
            background: var(--surface)
        }

        .tb-logo {
            width: 72px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
            flex-shrink: 0
        }

        .logo-mark {
            width: 30px;
            height: 30px
        }

            .logo-mark svg {
                width: 100%;
                height: 100%
            }

        .logo-ring {
            fill: none;
            stroke: var(--a);
            stroke-width: 2;
            stroke-dasharray: 88;
            animation: spin-ring 6s linear infinite;
            transition: stroke .4s
        }

        @keyframes spin-ring {
            to {
                stroke-dashoffset: -88
            }
        }

        .logo-dot {
            fill: var(--a);
            transition: fill .4s
        }

        .tb-wordmark {
            padding-left: 16px;
            font-family: var(--cond);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: .06em;
            display: flex;
            align-items: baseline;
            gap: 8px
        }

            .tb-wordmark em {
                font-style: normal;
                color: var(--a);
                transition: color .4s
            }

        .tb-tag {
            font-family: var(--mono);
            font-size: .56rem;
            color: var(--muted);
            letter-spacing: .12em
        }

        .tb-right {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .tb-mode-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 4px;
            border: 1px solid var(--a);
            background: color-mix(in srgb,var(--a) 8%,transparent);
            font-family: var(--mono);
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .1em;
            color: var(--a);
            text-transform: uppercase;
            transition: all .35s
        }

        .tb-blink {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--a);
            box-shadow: 0 0 8px var(--a);
            animation: blink 1.8s ease-in-out infinite;
            transition: background .4s, box-shadow .4s
        }

        @keyframes blink {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: .2
            }
        }

        .tb-status {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 7px #4ade80;
            animation: blink 2.4s ease-in-out infinite
        }

        /* SIDEBAR */
        .sidebar {
            grid-row: 2;
            grid-column: 1;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0;
            gap: 4px;
            position: sticky;
            top: 56px;
            height: calc(100vh - 56px)
        }

        .sb-btn {
            position: relative;
            width: 52px;
            height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            border: none;
            border-radius: var(--radius);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            font-family: var(--mono);
            font-size: .5rem;
            letter-spacing: .06em;
            text-transform: uppercase
        }

            .sb-btn svg {
                width: 18px;
                height: 18px;
                transition: stroke .3s
            }

            .sb-btn:hover {
                background: var(--panel);
                color: var(--dim)
            }

            .sb-btn::before {
                content: '';
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%) scaleY(0);
                width: 3px;
                height: 60%;
                border-radius: 0 2px 2px 0;
                background: var(--a);
                transition: transform .25s, background .4s
            }

            .sb-btn.active-sql {
                background: color-mix(in srgb,var(--sql-c) 11%,transparent);
                color: var(--sql-c);
                box-shadow: inset 0 0 0 1px color-mix(in srgb,var(--sql-c) 30%,transparent)
            }

            .sb-btn.active-docs {
                background: color-mix(in srgb,var(--docs-c) 11%,transparent);
                color: var(--docs-c);
                box-shadow: inset 0 0 0 1px color-mix(in srgb,var(--docs-c) 30%,transparent)
            }

            .sb-btn.active-pred {
                background: color-mix(in srgb,var(--pred-c) 11%,transparent);
                color: var(--pred-c);
                box-shadow: inset 0 0 0 1px color-mix(in srgb,var(--pred-c) 30%,transparent)
            }

                .sb-btn.active-sql::before, .sb-btn.active-docs::before, .sb-btn.active-pred::before {
                    transform: translateY(-50%) scaleY(1)
                }

            .sb-btn.active-sql svg {
                stroke: var(--sql-c)
            }

            .sb-btn.active-docs svg {
                stroke: var(--docs-c)
            }

            .sb-btn.active-pred svg {
                stroke: var(--pred-c)
            }

        .sb-divider {
            width: 32px;
            height: 1px;
            background: var(--border);
            margin: 6px 0
        }

        /* MAIN */
        .main {
            grid-row: 2;
            grid-column: 2;
            padding: 18px 22px 60px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto
        }

        /* MODE CONTEXT */
        .mode-context {
            border-radius: var(--radius);
            border: 1px solid color-mix(in srgb,var(--a) 28%,transparent);
            background: linear-gradient(135deg,color-mix(in srgb,var(--a) 7%,var(--surface)),var(--surface));
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color .4s, background .4s;
            position: relative;
            overflow: hidden
        }

            .mode-context::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg,var(--a),transparent 70%);
                transition: background .4s
            }

        .mc-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            background: color-mix(in srgb,var(--a) 14%,transparent);
            border: 1px solid color-mix(in srgb,var(--a) 30%,transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .4s
        }

            .mc-icon svg {
                width: 20px;
                height: 20px;
                stroke: var(--a);
                transition: stroke .4s
            }

        .mc-text {
            flex: 1
        }

        .mc-title {
            font-family: var(--cond);
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--a);
            letter-spacing: .04em;
            transition: color .4s
        }

        .mc-desc {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: .04em
        }

        .mc-shortcut {
            font-family: var(--mono);
            font-size: .58rem;
            color: var(--muted);
            text-align: right;
            line-height: 2
        }

            .mc-shortcut kbd {
                background: var(--panel);
                border: 1px solid var(--border2);
                border-radius: 3px;
                padding: 1px 5px;
                color: var(--dim)
            }

        /* INPUT PANEL */
        .input-panel {
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            overflow: hidden;
            transition: border-color .35s, box-shadow .35s
        }

            .input-panel:focus-within {
                border-color: var(--a);
                box-shadow: 0 0 0 3px color-mix(in srgb,var(--a) 13%,transparent), 0 0 28px color-mix(in srgb,var(--a) 9%,transparent)
            }

        .input-row {
            display: flex;
            align-items: center
        }

        .inp-pill {
            padding: 0 14px;
            height: 54px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            border-right: 1px solid var(--border);
            min-width: 60px;
            flex-shrink: 0
        }

        .inp-key {
            font-family: var(--mono);
            font-size: .72rem;
            font-weight: 600;
            color: var(--a);
            letter-spacing: .08em;
            transition: color .4s
        }

        .inp-sub {
            font-family: var(--mono);
            font-size: .5rem;
            color: var(--muted);
            letter-spacing: .06em
        }

        #txtQuestion {
            flex: 1;
            height: 54px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--sans);
            font-size: .95rem;
            padding: 0 16px
        }

            #txtQuestion::placeholder {
                color: var(--muted)
            }

        .input-actions {
            display: flex;
            align-items: center;
            border-left: 1px solid var(--border)
        }

        .iact-btn {
            width: 48px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            transition: color .2s, background .2s
        }

            .iact-btn:hover {
                background: var(--panel);
                color: var(--dim)
            }

            .iact-btn.mic-active {
                color: #f87171;
                animation: mic-pulse 1s ease-in-out infinite
            }

        @keyframes mic-pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: .35
            }
        }

        .btn-send {
            height: 54px;
            padding: 0 22px;
            background: var(--a);
            border: none;
            color: #000;
            font-family: var(--mono);
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .1em;
            cursor: pointer;
            transition: background .4s, filter .2s, opacity .2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap
        }

            .btn-send:hover:not(:disabled) {
                filter: brightness(1.18)
            }

            .btn-send:disabled {
                opacity: .4;
                cursor: not-allowed
            }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin .65s linear infinite;
            display: none
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* LOG */
        .log-wrap {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            overflow: hidden
        }

        .log-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 12px;
            background: var(--panel);
            border-bottom: 1px solid var(--border)
        }

        .log-bar-label {
            font-family: var(--mono);
            font-size: .56rem;
            letter-spacing: .12em;
            color: var(--muted);
            text-transform: uppercase
        }

        #logArea {
            height: 96px;
            overflow-y: auto;
            padding: 7px 12px;
            font-family: var(--mono);
            font-size: .68rem;
            line-height: 1.75;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent
        }

            #logArea::-webkit-scrollbar {
                width: 3px
            }

            #logArea::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 2px
            }

        .log-line {
            display: flex;
            gap: 10px
        }

        .log-time {
            color: var(--muted);
            flex-shrink: 0
        }

        .c-ok {
            color: #4ade80
        }

        .c-err {
            color: #f87171
        }

        .c-sys {
            color: var(--muted)
        }

        .c-user {
            color: var(--a);
            transition: color .4s
        }

        /* RESULT */
        #resultArea {
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: fadeUp .32s ease-out
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px
        }

        .result-label {
            font-family: var(--mono);
            font-size: .6rem;
            letter-spacing: .12em;
            color: var(--a);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color .4s
        }

            .result-label::before {
                content: '';
                display: block;
                width: 3px;
                height: 14px;
                background: var(--a);
                border-radius: 2px;
                transition: background .4s
            }

        /* DOCS CARD */
        .docs-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            font-family: var(--sans);
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text);
            animation: fadeUp .4s ease-out;
            border-left: 3px solid var(--docs-c);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* PREDICT */
        .pred-grid {
            display: none;
            grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
            gap: 12px
        }

        .pred-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
            animation: fadeUp .4s ease-out;
        }

            .pred-card::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(90deg,var(--pred-c),transparent)
            }

        .pred-category {
            font-family: var(--mono);
            font-size: .56rem;
            letter-spacing: .12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px
        }

        .pred-value {
            font-family: var(--cond);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--pred-c);
            line-height: 1;
            margin-bottom: 6px
        }

        .pred-label {
            font-size: .85rem;
            color: var(--dim);
            margin-bottom: 14px;
            line-height: 1.4
        }

        .pred-confidence {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .pred-bar-bg {
            flex: 1;
            height: 4px;
            background: var(--border2);
            border-radius: 2px;
            overflow: hidden
        }

        .pred-bar-fill {
            height: 100%;
            background: var(--pred-c);
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.16,1,0.3,1);
            box-shadow: 0 0 8px var(--pred-c)
        }

        .pred-conf-val {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--dim);
            white-space: nowrap
        }

        .pred-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: var(--mono);
            font-size: .62rem;
            padding: 2px 7px;
            border-radius: 3px;
            margin-top: 10px
        }

            .pred-trend.flat {
                background: rgba(148,163,184,.1);
                color: #94a3b8
            }

        /* SQL FOOTER */
        .sql-footer {
            display: none;
            margin-top: 10px
        }

        .export-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .feedback-panel {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .feedback-copy {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feedback-title {
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .12em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .feedback-status {
            font-size: .84rem;
            color: var(--dim);
        }

        .feedback-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .feedback-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            font-family: var(--mono);
            font-size: .66rem;
            letter-spacing: .04em;
            cursor: pointer;
            transition: border-color .2s, color .2s, transform .2s, background .2s;
        }

        .feedback-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .feedback-btn:disabled {
            opacity: .55;
            cursor: default;
        }

        .feedback-btn.up:hover:not(:disabled),
        .feedback-btn.up.active {
            border-color: var(--ok-c);
            color: var(--ok-c);
            background: color-mix(in srgb, var(--ok-c) 10%, var(--panel));
        }

        .feedback-btn.down:hover:not(:disabled),
        .feedback-btn.down.active {
            border-color: var(--err-c);
            color: var(--err-c);
            background: color-mix(in srgb, var(--err-c) 10%, var(--panel));
        }

        .feedback-icon {
            font-size: .95rem;
            line-height: 1;
        }

        /* ── CHART TOOLBAR — nuevo ── */
        .chart-toolbar {
            display: none;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* botones de acción (toggle sql, toggle chart) */
        .sql-toggle-btn {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--mono);
            font-size: .6rem;
            padding: 5px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color .2s, color .2s;
            white-space: nowrap;
        }

            .sql-toggle-btn:hover {
                border-color: var(--dim);
                color: var(--dim);
            }

        /* separador visual entre grupos */
        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: var(--border2);
            flex-shrink: 0;
        }

        /* selector de tipo de gráfica */
        .chart-type-group {
            display: flex;
            gap: 4px;
        }

        .chart-type-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--panel);
            color: var(--muted);
            font-family: var(--mono);
            font-size: .58rem;
            letter-spacing: .05em;
            cursor: pointer;
            transition: border-color .2s, color .2s, background .2s;
            white-space: nowrap;
        }

            .chart-type-btn svg {
                width: 12px;
                height: 12px;
                flex-shrink: 0;
            }

            .chart-type-btn:hover {
                border-color: var(--dim);
                color: var(--dim);
            }

            .chart-type-btn.active {
                border-color: var(--a);
                color: var(--a);
                background: color-mix(in srgb, var(--a) 10%, transparent);
            }

        #sqlContainer {
            display: none;
            margin-top: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            font-family: var(--mono);
            font-size: .72rem;
            color: var(--sql-c);
            overflow-x: auto;
            white-space: pre;
            line-height: 1.7
        }

        /* UTILS */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden
        }

            .data-table th {
                background: var(--panel);
                color: var(--muted);
                font-family: var(--mono);
                font-size: .58rem;
                padding: 10px 14px;
                text-align: left;
                border-bottom: 1px solid var(--border)
            }

            .data-table td {
                padding: 9px 14px;
                border-bottom: 1px solid var(--border);
                color: var(--dim);
                font-family: var(--mono);
                font-size: .74rem
            }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
            gap: 10px
        }

        .kpi-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px
        }

        .kpi-label {
            font-family: var(--mono);
            font-size: .58rem;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px
        }

        .kpi-value {
            font-family: var(--cond);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--a);
            line-height: 1
        }

        .chart-wrap {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px
        }

        .chart-inner {
            position: relative;
            height: 320px
        }

        @media(max-width:680px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 56px 48px 1fr
            }

            .sidebar {
                grid-row: 2;
                grid-column: 1;
                flex-direction: row;
                height: 48px;
                padding: 0 10px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 56px
            }

            .sb-btn {
                width: 44px;
                height: 40px
            }

                .sb-btn::before {
                    left: 50%;
                    top: auto;
                    bottom: 0;
                    transform: translateX(-50%) scaleX(0);
                    width: 60%;
                    height: 3px;
                    border-radius: 2px 2px 0 0
                }

            .main {
                grid-row: 3;
                padding: 12px
            }

            .chart-type-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- TOPBAR -->
        <header class="topbar">
            <div class="tb-logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="14" class="logo-ring" />
                        <circle cx="18" cy="18" r="4" class="logo-dot" />
                    </svg>
                </div>
            </div>
            <div class="tb-wordmark">VANNA<em>LIGHT</em> <span class="tb-tag">Industrial Intelligence</span></div>
            <div class="tb-right">
                <div class="tb-mode-badge" id="tbBadge"><div class="tb-blink"></div><span id="tbModeText">DATOS · SQL</span></div>
                <div class="tb-status"><div class="status-dot" id="statusDot"></div><span id="statusText">Iniciando...</span></div>
            </div>
        </header>

        <!-- SIDEBAR -->
        <nav class="sidebar">
            <button class="sb-btn active-sql" id="sb-sql" onclick="setMode('sql')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" /></svg>SQL
            </button>
            <button class="sb-btn" id="sb-docs" onclick="setMode('docs')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /></svg>PDF
            </button>
            <button class="sb-btn" id="sb-pred" onclick="setMode('pred')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></svg>ML
            </button>
            <div class="sb-divider"></div>
            <button class="sb-btn" id="sb-mic" onclick="startDictation()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" /></svg>VOZ
            </button>
        </nav>

        <!-- MAIN -->
        <main class="main">
            <div class="mode-context" id="modeContext">
                <div class="mc-icon">
                    <svg id="mcSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <ellipse cx="12" cy="5" rx="9" ry="3" />
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
                    </svg>
                </div>
                <div class="mc-text">
                    <div class="mc-title" id="mcTitle">MODO DATOS — SQL</div>
                    <div class="mc-desc" id="mcDesc">Consultas sobre bases de datos estructuradas</div>
                </div>
                <div class="mc-shortcut"><div><kbd>1</kbd> SQL <kbd>2</kbd> PDF <kbd>3</kbd> ML</div></div>
            </div>

            <div class="input-panel">
                <div class="input-row">
                    <div class="inp-pill">
                        <span class="inp-key" id="inpKey">SQL</span>
                        <span class="inp-sub" id="inpSub">datos</span>
                    </div>
                    <input type="text" id="txtQuestion" placeholder="Escribe tu consulta..."
                           onkeypress="handleKeyPress(event)" autocomplete="off" />
                    <div class="input-actions">
                        <button class="iact-btn" id="btnMic" onclick="startDictation()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            </svg>
                        </button>
                        <button class="btn-send" id="btnSend" onclick="sendQuestion()">
                            <div class="spinner" id="loadingIcon"></div>
                            <span id="btnLabel">EJECUTAR</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="log-wrap">
                <div class="log-bar"><span class="log-bar-label">Consola del sistema</span></div>
                <div id="logArea"></div>
            </div>

            <div id="resultArea">
                <div class="result-header">
                    <div class="result-label" id="resultLabel">RESULTADO</div>
                </div>
                <div class="docs-card" id="docsCard" style="display:none;"></div>
                <div class="kpi-grid" id="kpiContainer"></div>
                <div class="chart-wrap" id="chartContainer" style="display:none;">
                    <div class="chart-inner"><canvas id="liaChart"></canvas></div>
                </div>
                <!-- SQL FOOTER: toggle SQL + chart toolbar -->
                <div class="sql-footer" id="sqlFooter">

                    <!-- fila superior: acción SQL + acción chart -->
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
                        <button class="sql-toggle-btn" onclick="toggleSql()">VER T-SQL</button>
                        <div class="export-actions" id="exportActions" style="display:none;">
                            <button class="sql-toggle-btn" id="btnExportCsv" onclick="exportCurrentResultCsv()">EXPORTAR CSV</button>
                            <button class="sql-toggle-btn" id="btnExportPdf" onclick="exportCurrentResultPdf()">EXPORTAR PDF</button>
                        </div>

                        <!-- toolbar de gráfica — oculta hasta que haya chart -->
                        <div class="chart-toolbar" id="chartToolbar">
                            <div class="toolbar-sep"></div>
                            <button class="sql-toggle-btn" id="chartToggleBtn" onclick="toggleChart()">OCULTAR GRÁFICA</button>
                            <div class="toolbar-sep"></div>

                            <!-- selector de tipo de gráfica -->
                            <div class="chart-type-group" id="chartTypeGroup">

                                <button class="chart-type-btn active" id="ctype-bar" onclick="switchChartType('bar')" title="Barras">
                                    <!-- bar icon -->
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="12" width="4" height="9" />
                                        <rect x="10" y="7" width="4" height="14" />
                                        <rect x="17" y="4" width="4" height="17" />
                                    </svg>
                                    BAR
                                </button>

                                <button class="chart-type-btn" id="ctype-line" onclick="switchChartType('line')" title="Línea">
                                    <!-- line icon -->
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 17 8 11 13 14 19 6" />
                                        <circle cx="3" cy="17" r="1.5" fill="currentColor" />
                                        <circle cx="8" cy="11" r="1.5" fill="currentColor" />
                                        <circle cx="13" cy="14" r="1.5" fill="currentColor" />
                                        <circle cx="19" cy="6" r="1.5" fill="currentColor" />
                                    </svg>
                                    LINE
                                </button>

                                <button class="chart-type-btn" id="ctype-scatter" onclick="switchChartType('scatter')" title="Dispersión">
                                    <!-- scatter icon -->
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="5" cy="18" r="2" fill="currentColor" />
                                        <circle cx="10" cy="9" r="2" fill="currentColor" />
                                        <circle cx="16" cy="14" r="2" fill="currentColor" />
                                        <circle cx="20" cy="5" r="2" fill="currentColor" />
                                    </svg>
                                    SCATTER
                                </button>

                                <button class="chart-type-btn" id="ctype-pie" onclick="switchChartType('pie')" title="Pastel">
                                    <!-- pie icon -->
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
                                        <path d="M22 12A10 10 0 0 0 12 2v10z" />
                                    </svg>
                                    PIE
                                </button>

                            </div>
                        </div>
                    </div>

                    <div id="sqlContainer"></div>
                </div>
                <div class="table-wrap" id="tableContainer" style="display:none;"></div>
                <div class="pred-grid" id="predGrid"></div>
                <div class="feedback-panel" id="feedbackPanel">
                    <div class="feedback-copy">
                        <div class="feedback-title">Feedback de respuesta</div>
                        <div class="feedback-status" id="feedbackStatus">Indica si esta respuesta fue correcta o incorrecta.</div>
                    </div>
                    <div class="feedback-actions">
                        <button class="feedback-btn up" id="feedbackUpBtn" type="button" onclick="submitFeedback('Up')">
                            <span class="feedback-icon">👍</span>
                            <span>Correcta</span>
                        </button>
                        <button class="feedback-btn down" id="feedbackDownBtn" type="button" onclick="submitFeedback('Down')">
                            <span class="feedback-icon">👎</span>
                            <span>Incorrecta</span>
                        </button>
                    </div>
                </div>


            </div>
        </main>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        // MODES
        // ═══════════════════════════════════════════════════════════
        const MODES = {
            sql: { key: 'sql', modeVal: 0, label: 'SQL', sub: 'datos', title: 'MODO DATOS — SQL', desc: 'Consultas sobre bases de datos estructuradas KPI', ph: '¿Cuáles son los 5 números de parte con más scrap?', badge: 'DATOS · SQL', icon: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>' },
            docs: { key: 'docs', modeVal: 1, label: 'PDF', sub: 'documentos', title: 'MODO DOCUMENTOS — PDF', desc: 'Work Instructions y procedimientos de planta', ph: '¿Cuál es el empaque del N/P 421084-0006?', badge: 'DOCUMENTOS · PDF', icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>' },
            pred: { key: 'pred', modeVal: 2, label: 'ML', sub: 'predicción', title: 'MODO PREDICCIÓN — ML.NET', desc: 'Pronósticos de scrap a nivel turno', ph: '¿Cuál es el pronóstico de scrap para el cierre de este turno?', badge: 'PREDICCIÓN · ML', icon: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' }
        };

        let currentMode = 'sql';
        let lastRequestMode = 'sql';
        let myConnectionId = '';
        let currentChart = null;
        let chartVisible = true;
        let lastCompletedJobId = '';
        let submittedFeedback = null;
        let lastAskedQuestion = '';
        let lastSqlExportState = null;

        // datos del último chart para poder redibujar al cambiar tipo
        let lastChartModel = null;   // { labels, values, labelColumn, valueColumn }
        let activeChartType = 'bar';  // tipo actualmente renderizado

        // ═══════════════════════════════════════════════════════════
        // MODE SWITCHING
        // ═══════════════════════════════════════════════════════════
        function setMode(m) {
            currentMode = m;
            const c = MODES[m];
            document.documentElement.style.setProperty('--a', `var(--${m}-c)`);
            ['sql', 'docs', 'pred'].forEach(k =>
                document.getElementById('sb-' + k).className = 'sb-btn' + (k === m ? ' active-' + k : ''));
            document.getElementById('tbModeText').textContent = c.badge;
            document.getElementById('mcTitle').textContent = c.title;
            document.getElementById('mcDesc').textContent = c.desc;
            document.getElementById('mcSvg').innerHTML = c.icon;
            document.getElementById('inpKey').textContent = c.label;
            document.getElementById('inpSub').textContent = c.sub;
            document.getElementById('txtQuestion').placeholder = c.ph;
            logLine(`Modo → ${c.title}`, 'sys');
            hideResult();
            resetFeedbackPanel();
        }

        // ═══════════════════════════════════════════════════════════
        // SIGNALR
        // ═══════════════════════════════════════════════════════════
        const connection = new signalR.HubConnectionBuilder()
            .withUrl('/hub/assistant').withAutomaticReconnect().build();

        connection.on('JobStatusUpdated', d => logLine(`⏳ ${d.status}`, 'sys'));
        connection.on('JobFailed', d => { logLine(`❌ ${d.error}`, 'err'); resetUI(); resetFeedbackPanel(); });
        connection.on('JobCompleted', payload => {
            logLine('Completado', 'ok');
            resetUI();

            let data = payload;
            if (payload.resultJson) {
                try { data = JSON.parse(payload.resultJson); } catch { }
            }

            if (data?.IsPredictionRequest === true || data?.type === 'prediction') {
                renderPred(data);
            } else if (lastRequestMode === 'docs') {
                renderDocs(data);
            } else {
                renderSql(data);
            }

            prepareFeedbackPanel(payload?.JobId || payload?.jobId);
        });

        async function startConnection() {
            try {
                await connection.start();
                myConnectionId = connection.connectionId;
                document.getElementById('statusText').textContent = 'Vanna Neural Active';
                logLine('Sistema listo.', 'ok');
            } catch { setTimeout(startConnection, 5000); }
        }
        startConnection();

        // ═══════════════════════════════════════════════════════════
        // SEND
        // ═══════════════════════════════════════════════════════════
        async function sendQuestion() {
            const txt = document.getElementById('txtQuestion');
            const q = txt.value.trim();
            if (!q || !myConnectionId) return;

            lastRequestMode = currentMode;
            document.getElementById('loadingIcon').style.display = 'block';
            document.getElementById('btnSend').disabled = true;
            hideResult();
            resetFeedbackPanel();
            logLine(`→ ${q}`, 'user');
            lastAskedQuestion = q;
            txt.value = '';
            txt.focus();

            try {
                const response = await fetch('/api/assistant/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: q,
                        userId: 'user_01',
                        connectionId: myConnectionId,
                        mode: MODES[currentMode].modeVal
                    })
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText || 'No se pudo procesar la solicitud.'}`);
                }
            } catch (e) {
                logLine(`Error red: ${e.message}`, 'err');
                resetUI();
                txt.value = q;
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendQuestion(); }
        function resetUI() { document.getElementById('loadingIcon').style.display = 'none'; document.getElementById('btnSend').disabled = false; }
        function hideResult() { document.getElementById('resultArea').style.display = 'none'; }

        function resetFeedbackPanel() {
            lastCompletedJobId = '';
            submittedFeedback = null;

            const panel = document.getElementById('feedbackPanel');
            const status = document.getElementById('feedbackStatus');
            const upBtn = document.getElementById('feedbackUpBtn');
            const downBtn = document.getElementById('feedbackDownBtn');

            if (panel) panel.style.display = 'none';
            if (status) status.textContent = 'Indica si esta respuesta fue correcta o incorrecta.';

            [upBtn, downBtn].forEach(btn => {
                if (!btn) return;
                btn.disabled = false;
                btn.classList.remove('active');
            });
        }

        function prepareFeedbackPanel(jobId) {
            const panel = document.getElementById('feedbackPanel');
            const status = document.getElementById('feedbackStatus');
            const upBtn = document.getElementById('feedbackUpBtn');
            const downBtn = document.getElementById('feedbackDownBtn');

            lastCompletedJobId = typeof jobId === 'string' ? jobId : (jobId ? String(jobId) : '');
            submittedFeedback = null;

            if (!panel || !status || !upBtn || !downBtn) return;

            if (!lastCompletedJobId) {
                panel.style.display = 'none';
                return;
            }

            panel.style.display = 'flex';
            status.textContent = 'Indica si esta respuesta fue correcta o incorrecta.';
            upBtn.disabled = false;
            downBtn.disabled = false;
            upBtn.classList.remove('active');
            downBtn.classList.remove('active');
        }

        async function submitFeedback(feedback) {
            if (!lastCompletedJobId || submittedFeedback) return;

            const status = document.getElementById('feedbackStatus');
            const upBtn = document.getElementById('feedbackUpBtn');
            const downBtn = document.getElementById('feedbackDownBtn');
            if (!status || !upBtn || !downBtn) return;

            upBtn.disabled = true;
            downBtn.disabled = true;
            status.textContent = 'Guardando feedback...';

            try {
                const response = await fetch('/api/assistant/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jobId: lastCompletedJobId,
                        feedback: feedback
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText || 'No se pudo guardar el feedback.'}`);
                }

                submittedFeedback = feedback;
                upBtn.classList.toggle('active', feedback === 'Up');
                downBtn.classList.toggle('active', feedback === 'Down');
                status.textContent = feedback === 'Up'
                    ? 'Gracias. Marcaste esta respuesta como correcta.'
                    : 'Gracias. Marcaste esta respuesta para revisión.';
                logLine(`Feedback usuario → ${feedback}`, 'sys');
            } catch (e) {
                status.textContent = 'No se pudo guardar el feedback. Intenta nuevamente.';
                upBtn.disabled = false;
                downBtn.disabled = false;
                logLine(`Error feedback: ${e.message}`, 'err');
            }
        }

        // ═══════════════════════════════════════════════════════════
        // PRE-RENDER CLEANUP
        // ═══════════════════════════════════════════════════════════
        function preRender() {
            document.getElementById('resultArea').style.display = 'flex';
            document.getElementById('kpiContainer').innerHTML = '';
            document.getElementById('chartContainer').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('predGrid').style.display = 'none';
            document.getElementById('sqlFooter').style.display = 'none';
            document.getElementById('docsCard').style.display = 'none';
            document.getElementById('sqlContainer').style.display = 'none';
            document.getElementById('exportActions').style.display = 'none';

            // reset chart toolbar
            document.getElementById('chartToolbar').style.display = 'none';
            document.getElementById('chartToggleBtn').textContent = 'OCULTAR GRÁFICA';
            chartVisible = true;
            lastChartModel = null;
            lastSqlExportState = null;

            // reset tipo activo a bar
            setActiveChartTypeBtn('bar');
            activeChartType = 'bar';

            if (currentChart) { currentChart.destroy(); currentChart = null; }
        }

        // ═══════════════════════════════════════════════════════════
        // RENDER DOCS
        // ═══════════════════════════════════════════════════════════
        function renderDocs(payload) {
            preRender();
            document.getElementById('resultLabel').textContent = 'RESULTADO — DOCUMENTOS';
            const docsCard = document.getElementById('docsCard');
            docsCard.style.display = 'block';
            const answer =
                payload?.HumanizedMessage || payload?.answer ||
                payload?.text || payload?.message || 'Documento analizado correctamente.';
            docsCard.textContent = String(answer);
            speakSummary(String(answer));
        }

        // ═══════════════════════════════════════════════════════════
        // RENDER PRED
        // ═══════════════════════════════════════════════════════════
        function renderPred(payload) {
            preRender();
            document.getElementById('resultLabel').textContent = 'RESULTADO — PRONÓSTICO INDUSTRIAL';
            const grid = document.getElementById('predGrid');
            grid.style.display = 'grid';
            const p = payload.data || payload;

            if (p && p.PredictedValue !== undefined) {
                grid.innerHTML = `
                <div class="pred-card">
                    <div class="pred-category">PRONÓSTICO DE SCRAP (CIERRE)</div>
                    <div class="pred-value">${fmtVal(p.PredictedValue)}<span style="font-size:1rem;font-weight:400;margin-left:4px;color:var(--muted)">piezas</span></div>
                    <div class="pred-label">N/P: <strong style="color:var(--text)">${p.EntityName || 'General'}</strong><br><span style="color:var(--dim);font-size:.75rem">Periodo: ${p.ForecastPeriodLabel || 'Turno'}</span></div>
                    <div class="pred-confidence">
                        <div class="pred-bar-bg"><div class="pred-bar-fill" style="width:100%"></div></div>
                        <span class="pred-conf-val">🛡️ ${p.HistoryShiftsUsed || 0} turnos históricos</span>
                    </div>
                    <div class="pred-trend flat">Baseline ML.NET v1.0</div>
                </div>
                <div style="grid-column:1/-1;margin-top:10px;font-size:.85rem;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)">
                    <span style="color:var(--pred-c)">🤖 Análisis:</span> ${p.HumanizedMessage || payload.explanation || 'Predicción de cierre de turno generada.'}
                </div>`;
                speakSummary(p.HumanizedMessage || payload.explanation);
            } else {
                grid.innerHTML = `<div style="color:var(--dim);font-family:var(--mono);padding:20px">No se recibieron datos de predicción válidos.</div>`;
            }
        }

        // ═══════════════════════════════════════════════════════════
        // RENDER SQL
        // ═══════════════════════════════════════════════════════════
        function renderSql(payload) {
            preRender();
            document.getElementById('resultLabel').textContent = 'RESULTADO — DATOS';
            document.getElementById('sqlFooter').style.display = 'block';
            const sqlText = payload.sql || payload.sqlText || '';
            document.getElementById('sqlContainer').textContent = sqlText;

            const data = Array.isArray(payload.data)
                ? payload.data
                : Array.isArray(payload.rows)
                    ? payload.rows
                    : [];

            lastSqlExportState = {
                question: lastAskedQuestion,
                sql: sqlText,
                rows: Array.isArray(data) ? data : []
            };
            updateExportActions(lastSqlExportState);

            if (!data || data.length === 0) {
                document.getElementById('kpiContainer').innerHTML =
                    '<div class="kpi-card"><div class="kpi-label">Resultado</div><div class="kpi-value">Sin datos</div></div>';
                return;
            }

            // Intentar renderizar chart; si hay modelo válido, guardarlo
            const chartRendered = renderChartFromRows(data, activeChartType);

            if (data.length === 1) {
                document.getElementById('kpiContainer').innerHTML = Object.entries(data[0])
                    .map(([k, v]) => `<div class="kpi-card"><div class="kpi-label">${k}</div><div class="kpi-value">${fmtVal(v)}</div></div>`)
                    .join('');
            } else {
                document.getElementById('tableContainer').style.display = 'block';
                const h = Object.keys(data[0]);
                document.getElementById('tableContainer').innerHTML =
                    `<table class="data-table">
                    <thead><tr>${h.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                    <tbody>${data.map(r => `<tr>${h.map(c => `<td>${fmtVal(r[c])}</td>`).join('')}</tr>`).join('')}</tbody>
                </table>`;
            }

            if (!chartRendered) {
                document.getElementById('chartContainer').style.display = 'none';
                document.getElementById('chartToolbar').style.display = 'none';
            }
        }

        // ═══════════════════════════════════════════════════════════
        // CHART UTILS
        // ═══════════════════════════════════════════════════════════
        function toNumberOrNull(value) {
            if (typeof value === 'number' && Number.isFinite(value)) return value;
            if (typeof value === 'string') {
                const cleaned = value.replace(/,/g, '').trim();
                if (cleaned === '') return null;
                const n = Number(cleaned);
                if (Number.isFinite(n)) return n;
            }
            return null;
        }

        function normalizeColumnName(name) {
            return String(name || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase();
        }

        function isTechnicalIdColumn(name) {
            const normalized = normalizeColumnName(name);
            return normalized === 'id'
                || normalized.endsWith('id')
                || normalized.endsWith('_id')
                || normalized.includes('identifier')
                || normalized.includes('folio')
                || normalized.includes('consecutivo')
                || normalized.includes('codigo')
                || normalized.includes('code')
                || normalized.includes('clave')
                || normalized.includes('key');
        }

        function scoreNumericColumn(name, rows) {
            const normalized = normalizeColumnName(name);
            let score = 0;

            const metricHints = [
                'total', 'sum', 'qty', 'quantity', 'count', 'avg', 'average', 'mean',
                'min', 'max', 'amount', 'value', 'metric', 'score', 'rate',
                'scrap', 'production', 'produccion', 'pieces', 'piezas', 'hours', 'horas'
            ];

            const groupingHints = ['turno', 'shift', 'fecha', 'date', 'dia', 'day', 'mes', 'month', 'ano', 'year'];

            if (metricHints.some(hint => normalized.includes(hint))) score += 12;
            if (groupingHints.some(hint => normalized.includes(hint))) score += 3;
            if (isTechnicalIdColumn(name)) score -= 20;

            const numericValues = rows
                .map(r => toNumberOrNull(r[name]))
                .filter(v => v !== null);

            const distinctValues = new Set(numericValues).size;
            if (distinctValues <= 1) score -= 2;
            if (distinctValues < numericValues.length) score += 1;

            return score;
        }

        function scoreLabelColumn(name) {
            const normalized = normalizeColumnName(name);
            let score = 0;

            if (!isTechnicalIdColumn(name)) score += 8;
            if (normalized.includes('name') || normalized.includes('nombre')) score += 6;
            if (normalized.includes('operator') || normalized.includes('operador')) score += 5;
            if (normalized.includes('line') || normalized.includes('linea')) score += 4;
            if (normalized.includes('part') || normalized.includes('parte')) score += 4;
            if (normalized.includes('shift') || normalized.includes('turno')) score += 3;
            if (normalized.includes('date') || normalized.includes('fecha')) score += 3;
            if (normalized.includes('group') || normalized.includes('grupo')) score += 2;
            if (normalized.includes('type') || normalized.includes('tipo')) score += 2;
            if (normalized.includes('status') || normalized.includes('estado')) score += 1;

            return score;
        }

        function buildChartModel(rows) {
            if (!Array.isArray(rows) || rows.length < 2) return null;
            const columns = Object.keys(rows[0] || {});
            if (columns.length < 2) return null;

            const numericColumns = columns.filter(col => rows.some(r => toNumberOrNull(r[col]) !== null));
            if (numericColumns.length === 0) return null;

            const labelCandidates = columns.filter(col => !numericColumns.includes(col));
            const labelColumn = (labelCandidates.length > 0
                ? labelCandidates.slice().sort((a, b) => scoreLabelColumn(b) - scoreLabelColumn(a))[0]
                : columns.find(col => !isTechnicalIdColumn(col)) || columns[0]);

            const rankedNumericColumns = numericColumns
                .filter(col => col !== labelColumn)
                .slice()
                .sort((a, b) => scoreNumericColumn(b, rows) - scoreNumericColumn(a, rows));

            const valueColumn = rankedNumericColumns[0] || numericColumns[0];
            if (!labelColumn || !valueColumn) return null;
            if (isTechnicalIdColumn(valueColumn) && rankedNumericColumns.length === 1) return null;

            const limitedRows = rows.slice(0, 20);
            const labels = limitedRows.map(r => String(r[labelColumn] ?? '—'));
            const values = limitedRows.map(r => toNumberOrNull(r[valueColumn]) ?? 0);
            if (!values.some(v => v !== 0)) return null;

            return { labelColumn, valueColumn, labels, values };
        }

        // paleta de colores para pie/scatter
        const CHART_COLORS = [
            'rgba(34,211,238,.75)', 'rgba(52,211,153,.75)', 'rgba(167,139,250,.75)',
            'rgba(251,191,36,.75)', 'rgba(248,113,113,.75)', 'rgba(96,165,250,.75)',
            'rgba(244,114,182,.75)', 'rgba(34,197,94,.75)', 'rgba(251,146,60,.75)',
            'rgba(129,140,248,.75)'
        ];

        /**
         * Renderiza (o rerenderiza) el chart con el tipo indicado.
         * Si chartModel es null intenta construirlo desde rows.
         */
        function renderChartFromRows(rows, chartType) {
            const model = buildChartModel(rows);
            if (!model) return false;
            lastChartModel = model;
            drawChart(model, chartType);
            return true;
        }

        function drawChart(model, chartType) {
            const chartContainer = document.getElementById('chartContainer');
            const chartToolbar = document.getElementById('chartToolbar');
            const ctx = document.getElementById('liaChart').getContext('2d');

            chartContainer.style.display = 'block';
            chartToolbar.style.display = 'flex';

            if (currentChart) { currentChart.destroy(); currentChart = null; }

            const accentColor = getComputedStyle(document.documentElement)
                .getPropertyValue('--sql-c').trim() || '#22d3ee';

            // Preparar dataset según tipo
            let dataset;
            let chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 400 },
                plugins: {
                    legend: { display: chartType === 'pie', labels: { color: '#dde4f0', font: { family: "'IBM Plex Mono'" } } },
                    tooltip: {
                        backgroundColor: '#161b25',
                        borderColor: '#1e2535',
                        borderWidth: 1,
                        titleColor: '#dde4f0',
                        bodyColor: '#7a8a9e',
                        titleFont: { family: "'IBM Plex Mono'", size: 11 },
                        bodyFont: { family: "'IBM Plex Mono'", size: 11 },
                    }
                }
            };

            if (chartType === 'pie') {
                dataset = {
                    label: model.valueColumn,
                    data: model.values,
                    backgroundColor: model.values.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]),
                    borderColor: '#09090c',
                    borderWidth: 2,
                    hoverOffset: 8,
                };
                // pie no usa scales
            } else if (chartType === 'scatter') {
                // scatter necesita {x, y} — mapeamos índice → valor
                dataset = {
                    label: model.valueColumn,
                    data: model.values.map((v, i) => ({ x: i, y: v })),
                    backgroundColor: CHART_COLORS[0],
                    borderColor: CHART_COLORS[0],
                    pointRadius: 5,
                    pointHoverRadius: 7,
                };
                chartOptions.scales = {
                    x: {
                        ticks: { color: '#7a8a9e', callback: (val) => model.labels[val] ?? val },
                        grid: { color: 'rgba(255,255,255,0.06)' }
                    },
                    y: { beginAtZero: true, ticks: { color: '#7a8a9e' }, grid: { color: 'rgba(255,255,255,0.06)' } }
                };
            } else {
                // bar / line
                dataset = {
                    label: model.valueColumn,
                    data: model.values,
                    backgroundColor: chartType === 'bar'
                        ? model.values.map((_, i) => CHART_COLORS[i % CHART_COLORS.length])
                        : 'transparent',
                    borderColor: chartType === 'line' ? CHART_COLORS[0] : undefined,
                    borderWidth: chartType === 'line' ? 2 : 0,
                    borderRadius: chartType === 'bar' ? 4 : 0,
                    pointBackgroundColor: chartType === 'line' ? CHART_COLORS[0] : undefined,
                    pointRadius: chartType === 'line' ? 3 : undefined,
                    tension: chartType === 'line' ? 0.35 : undefined,
                    fill: chartType === 'line'
                        ? { target: 'origin', above: 'rgba(34,211,238,0.06)' }
                        : false,
                };
                chartOptions.scales = {
                    x: { ticks: { color: '#7a8a9e', font: { family: "'IBM Plex Mono'", size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' } },
                    y: { beginAtZero: true, ticks: { color: '#7a8a9e', font: { family: "'IBM Plex Mono'", size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' } }
                };
            }

            currentChart = new Chart(ctx, {
                type: chartType === 'scatter' ? 'scatter' : chartType,
                data: {
                    labels: chartType === 'scatter' ? undefined : model.labels,
                    datasets: [dataset]
                },
                options: chartOptions
            });
        }

        // ── Cambio manual de tipo de gráfica ──
        function switchChartType(type) {
            if (!lastChartModel) return;        // no hay datos, ignorar
            activeChartType = type;
            setActiveChartTypeBtn(type);
            drawChart(lastChartModel, type);

            // si el chart estaba oculto, mostrarlo al cambiar tipo
            if (!chartVisible) {
                chartVisible = true;
                document.getElementById('chartContainer').style.display = 'block';
                document.getElementById('chartToggleBtn').textContent = 'OCULTAR GRÁFICA';
            }
        }

        function setActiveChartTypeBtn(type) {
            ['bar', 'line', 'scatter', 'pie'].forEach(t => {
                const btn = document.getElementById('ctype-' + t);
                if (btn) btn.className = 'chart-type-btn' + (t === type ? ' active' : '');
            });
        }

        function toggleChart() {
            chartVisible = !chartVisible;
            document.getElementById('chartContainer').style.display = chartVisible ? 'block' : 'none';
            document.getElementById('chartToggleBtn').textContent = chartVisible ? 'OCULTAR GRÁFICA' : 'VER GRÁFICA';
        }

        function toggleSql() {
            const c = document.getElementById('sqlContainer');
            c.style.display = c.style.display === 'none' ? 'block' : 'none';
        }

        function updateExportActions(state) {
            const wrap = document.getElementById('exportActions');
            if (!wrap) return;

            const hasRows = !!(state && Array.isArray(state.rows) && state.rows.length);
            wrap.style.display = hasRows ? 'flex' : 'none';
        }

        function sanitizeExportFileName(value) {
            return String(value || 'resultado-sql')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-zA-Z0-9-_]+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '')
                .toLowerCase() || 'resultado-sql';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function downloadBlob(fileName, blob) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            link.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function buildCsvContent(rows) {
            if (!Array.isArray(rows) || rows.length === 0) return '';

            const headers = Object.keys(rows[0] || {});
            const escapeCsv = value => {
                const text = value == null ? '' : String(value);
                if (/[",\n\r]/.test(text)) {
                    return `"${text.replace(/"/g, '""')}"`;
                }
                return text;
            };

            return '\uFEFF' + [
                headers.map(escapeCsv).join(','),
                ...rows.map(row => headers.map(header => escapeCsv(row[header])).join(','))
            ].join('\r\n');
        }

        function exportCurrentResultCsv() {
            if (!lastSqlExportState?.rows?.length) {
                logLine('No hay datos tabulares para exportar a CSV.', 'err');
                return;
            }

            const baseName = sanitizeExportFileName(lastSqlExportState.question || 'resultado-sql');
            const csv = buildCsvContent(lastSqlExportState.rows);
            downloadBlob(`${baseName}.csv`, new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            logLine('Resultado exportado a CSV.', 'ok');
        }

        function exportCurrentResultPdf() {
            if (!lastSqlExportState?.rows?.length) {
                logLine('No hay datos tabulares para exportar a PDF.', 'err');
                return;
            }

            const rows = lastSqlExportState.rows;
            const headers = Object.keys(rows[0] || {});
            const tableHtml = `
                <table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px;">
                    <thead>
                        <tr>
                            ${headers.map(h => `<th style="border:1px solid #d1d5db;padding:8px;background:#f3f4f6;text-align:left;">${escapeHtml(h)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(row => `
                            <tr>
                                ${headers.map(h => `<td style="border:1px solid #e5e7eb;padding:8px;vertical-align:top;">${escapeHtml(fmtVal(row[h]))}</td>`).join('')}
                            </tr>`).join('')}
                    </tbody>
                </table>`;

            const win = window.open('', '_blank', 'width=1200,height=900');
            if (!win) {
                logLine('El navegador bloqueó la ventana de impresión.', 'err');
                return;
            }

            const printedAt = new Date().toLocaleString('es-MX');
            win.document.write(`
                <!doctype html>
                <html>
                <head>
                    <meta charset="utf-8" />
                    <title>Resultado VannaLight</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 24px; color: #111827; }
                        h1 { margin: 0 0 8px; font-size: 22px; }
                        .meta { margin-bottom: 18px; color: #4b5563; font-size: 12px; }
                        .block { margin-bottom: 20px; }
                        .label { font-weight: 700; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; color: #2563eb; }
                        pre { background: #f9fafb; border: 1px solid #e5e7eb; padding: 12px; white-space: pre-wrap; word-break: break-word; }
                    </style>
                </head>
                <body>
                    <h1>Resultado exportado de VannaLight</h1>
                    <div class="meta">Generado: ${escapeHtml(printedAt)} | Filas: ${rows.length}</div>
                    <div class="block">
                        <div class="label">Pregunta</div>
                        <pre>${escapeHtml(lastSqlExportState.question || 'Sin pregunta registrada')}</pre>
                    </div>
                    <div class="block">
                        <div class="label">SQL generado</div>
                        <pre>${escapeHtml(lastSqlExportState.sql || 'Sin SQL registrado')}</pre>
                    </div>
                    <div class="block">
                        <div class="label">Resultado</div>
                        ${tableHtml}
                    </div>
                </body>
                </html>`);
            win.document.close();
            win.focus();
            win.print();
            logLine('Vista de impresión PDF abierta.', 'ok');
        }

        // ═══════════════════════════════════════════════════════════
        // LOG
        // ═══════════════════════════════════════════════════════════
        function logLine(msg, type = 'ok') {
            const la = document.getElementById('logArea');
            const div = document.createElement('div');
            div.className = 'log-line';

            const time = document.createElement('span');
            time.className = 'log-time';
            time.textContent = new Date().toLocaleTimeString();

            const text = document.createElement('span');
            text.className = `c-${type}`;
            text.textContent = msg;

            div.appendChild(time);
            div.appendChild(text);
            la.appendChild(div);
            la.scrollTop = la.scrollHeight;
        }

        // ═══════════════════════════════════════════════════════════
        // VOICE
        // ═══════════════════════════════════════════════════════════
        function startDictation() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                logLine('Voz no soportada en este navegador.', 'err'); return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-MX';
            recognition.interimResults = false;
            document.getElementById('btnMic').classList.add('mic-active');
            logLine('Escuchando...', 'sys');

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('txtQuestion').value = transcript;
                logLine(`Voz detectada: "${transcript}"`, 'ok');
                sendQuestion();
            };
            recognition.onerror = function (event) {
                logLine('Error en dictado: ' + event.error, 'err');
                document.getElementById('btnMic').classList.remove('mic-active');
            };
            recognition.onend = function () { document.getElementById('btnMic').classList.remove('mic-active'); };
            recognition.start();
        }

        function speakSummary(text) {
            if (!window.speechSynthesis || !text) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text.replace(/🤖/g, ''));
            u.lang = 'es-MX'; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        // ═══════════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════════
        function fmtVal(v) {
            if (typeof v === 'number') return v.toLocaleString('es-MX', { maximumFractionDigits: 2 });
            return v ?? '—';
        }

        // INIT
        setMode('sql');
    </script>
</body>
